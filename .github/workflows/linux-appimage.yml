name: linux-appimage

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: Optional version to package (for example 0.1.0 or v0.1.0).
        required: false
        type: string

env:
  ADWAITA_THEME_REPOSITORY: danjboyd/plugins-themes-Adwaita
  ADWAITA_THEME_REF: 9d455f67587242400f6620a0e8884084850d1204

jobs:
  build-appimage:
    runs-on:
      - self-hosted
      - linux
      - gnustep-clang
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Checkout Adwaita theme
        uses: actions/checkout@v4
        with:
          repository: ${{ env.ADWAITA_THEME_REPOSITORY }}
          ref: ${{ env.ADWAITA_THEME_REF }}
          path: third_party/plugins-themes-Adwaita
          fetch-depth: 1

      - name: Verify GNUstep clang environment
        shell: bash
        run: |
          set -euo pipefail
          test -f /usr/GNUstep/System/Library/Makefiles/GNUstep.sh
          set +u
          source /usr/GNUstep/System/Library/Makefiles/GNUstep.sh
          set -u
          command -v clang
          command -v gmake
          command -v curl
          command -v pandoc
          command -v magick || command -v convert

      - name: Build (GNUstep clang)
        shell: bash
        run: |
          set -euo pipefail
          set +u
          source /usr/GNUstep/System/Library/Makefiles/GNUstep.sh
          set -u
          gmake OMD_SKIP_TESTS=1

      - name: Stage AppDir
        shell: bash
        run: |
          set -euo pipefail
          ./scripts/linux/stage-appimage-runtime.sh dist/ObjcMarkdown.AppDir third_party/plugins-themes-Adwaita

      - name: Validate staged AppDir
        shell: bash
        run: |
          set -euo pipefail
          ./scripts/linux/validate-appimage.sh dist/ObjcMarkdown.AppDir

      - name: Resolve Version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          version_pattern='^v?([0-9]+\.[0-9]+\.[0-9]+)([-+].*)?$'
          input_version='${{ github.event.inputs.version }}'
          ref_type='${{ github.ref_type }}'
          ref_name='${{ github.ref_name }}'

          if [[ "$input_version" =~ $version_pattern ]]; then
            version="${BASH_REMATCH[1]}"
          elif [[ "$ref_type" == "tag" && "$ref_name" =~ $version_pattern ]]; then
            version="${BASH_REMATCH[1]}"
          else
            tag="$(git describe --tags --abbrev=0 2>/dev/null || true)"
            if [[ "$tag" =~ $version_pattern ]]; then
              version="${BASH_REMATCH[1]}"
            else
              version="0.0.0"
            fi
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Download linuxdeploy
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p tools/linuxdeploy
          curl -L -o tools/linuxdeploy/linuxdeploy-x86_64.AppImage \
            https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          curl -L -o tools/linuxdeploy/linuxdeploy-plugin-appimage-x86_64.AppImage \
            https://github.com/linuxdeploy/linuxdeploy-plugin-appimage/releases/download/continuous/linuxdeploy-plugin-appimage-x86_64.AppImage
          chmod +x tools/linuxdeploy/linuxdeploy-x86_64.AppImage
          chmod +x tools/linuxdeploy/linuxdeploy-plugin-appimage-x86_64.AppImage

      - name: Build AppImage
        shell: bash
        env:
          ARCH: x86_64
          LINUXDEPLOY_OUTPUT_VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          source dist/ObjcMarkdown.AppDir/.omd-appdir-manifest
          : "${APP_RUNTIME_LIB_DIR:=$APPDIR/usr/lib/ObjcMarkdownRuntime}"

          export PATH="$PWD/tools/linuxdeploy:$PATH"
          export LD_LIBRARY_PATH="$APP_RUNTIME_LIB_DIR:$APPDIR/usr/GNUstep/System/Library/Libraries${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}"
          ./tools/linuxdeploy/linuxdeploy-x86_64.AppImage \
            --appdir "$APPDIR" \
            --desktop-file "$DESKTOP_FILE" \
            --icon-file "$ICON_FILE" \
            --output appimage

          generated="$(find . -maxdepth 1 -type f -name '*.AppImage' | head -n 1)"
          if [[ -z "$generated" ]]; then
            echo "ERROR: linuxdeploy did not produce an AppImage" >&2
            exit 1
          fi

          mv "$generated" "dist/ObjcMarkdown-${LINUXDEPLOY_OUTPUT_VERSION}-linux-x86_64.AppImage"

      - name: Validate AppImage
        shell: bash
        run: |
          set -euo pipefail
          appimage="$(find dist -maxdepth 1 -type f -name 'ObjcMarkdown-*-linux-x86_64.AppImage' | head -n 1)"
          if [[ -z "$appimage" ]]; then
            echo "ERROR: packaged AppImage not found" >&2
            exit 1
          fi
          ./scripts/linux/validate-appimage.sh "$appimage"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: objcmarkdown-linux-${{ steps.version.outputs.version }}
          path: |
            dist/*.AppImage
