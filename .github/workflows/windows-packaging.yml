name: windows-packaging

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: Optional version to package (for example 0.1.0, 0.1.1-rc2, or v0.1.0).
        required: false
        type: string

jobs:
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve Version
        id: version
        shell: pwsh
        run: |
          $versionPattern = '^v?(\d+\.\d+\.\d+(?:[-+][0-9A-Za-z.-]+)?)$'
          $inputVersion = "${{ github.event.inputs.version }}"
          $refType = "${{ github.ref_type }}"
          $refName = "${{ github.ref_name }}"

          if ($inputVersion -match $versionPattern) {
            $version = $Matches[1]
          } elseif ($refType -eq "tag" -and $refName -match $versionPattern) {
            $version = $Matches[1]
          } else {
            $tag = (git describe --tags --abbrev=0 2>$null)
            if ($LASTEXITCODE -ne 0) {
              $tag = ""
              $global:LASTEXITCODE = 0
            }
            if ($tag -match $versionPattern) {
              $version = $Matches[1]
            } else {
              $version = "0.0.0"
            }
          }

          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

  build-msi:
    needs: resolve-version
    uses: danjboyd/gnustep-packager/.github/workflows/package-gnustep-app.yml@main
    with:
      manifest-path: packaging/package.manifest.json
      backend: msi
      package-version: ${{ needs.resolve-version.outputs.version }}
      msys2-packages: >-
        mingw-w64-clang-x86_64-cmark
      preflight-shell: pwsh
      preflight-command: |
        git submodule update --init --recursive

        $themeRoot = Join-Path $env:GITHUB_WORKSPACE ".omd-theme-inputs"
        New-Item -ItemType Directory -Force -Path $themeRoot | Out-Null

        foreach ($repo in @("plugins-themes-win11theme", "plugins-themes-winuitheme")) {
          $target = Join-Path $themeRoot $repo
          if (Test-Path $target) {
            continue
          }

          git clone --depth 1 ("https://github.com/danjboyd/{0}.git" -f $repo) $target
        }
      run-validation: true
      run-smoke: true
      artifact-name: objcmarkdown-windows-${{ needs.resolve-version.outputs.version }}
    secrets: inherit
